<!DOCTYPE HTML>

<html>
	<head>
		<title>Profiles - AVB Community</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<!-- Header -->
				<section id="header">
					<div class="container">

						<!-- Logo -->
							<h1 id="logo"><a href="index.html">Profiles</a></h1>
							<p>AVB Community Profile Specifications</p>

						<!-- Nav -->
							<nav id="nav">
								<ul>
									<li><a class="icon solid fa-microchip" href="index.html"><span>AVB Community</span></a></li>
									<li><a class="icon solid fa-clipboard-list" href="profiles.html"><span>Profiles</span></a></li>
									<li><a class="icon solid fa-terminal" href="cli_tools.html"><span>CLI Tools</span></a></li>
								</ul>
							</nav>

					</div>
				</section>

			<!-- Main -->
				<section id="main">
					<div class="container">
						<div id="content">

							<!-- Post -->
								<article class="box post">
									<header>
										<nav id="profile-nav">
											<a href="#" class="profile-tab active" data-file="audio_basic.md">Basic Audio</a>
											<a href="#" class="profile-tab" data-file="audio_extended.md">Extended Audio</a>
											<a href="#" class="profile-tab" data-file="video_basic.md">Basic Video</a>
											<a href="#" class="profile-tab" data-file="video_extended.md">Extended Video</a>
										</nav>
									</header>

									<section id="profile-content">
										<div id="profile-content-body"><p>Loading...</p></div>
									</section>
								</article>

						</div>
					</div>
				</section>

<!-- Footer -->
				<section id="footer">
					<div class="container">
						<small>Profile specifications and tools are licensed under the <a href="https://opensource.org/licenses/MIT">MIT License</a>. This website is licensed under the <a href="https://creativecommons.org/licenses/by/3.0/">CCA 3.0 License</a>.</small>
					</div>
				</section>

		</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
			<script>
				var baseUrl = 'https://raw.githubusercontent.com/avbcommunity/profiles/refs/heads/main/';

				function loadProfile(filename) {
					document.getElementById('profile-content-body').innerHTML = '<p>Loading...</p>';
					fetch(baseUrl + filename)
						.then(function(response) {
							if (!response.ok) throw new Error('Failed to load profile');
							return response.text();
						})
						.then(function(markdown) {
							document.getElementById('profile-content-body').innerHTML = marked.parse(markdown);
						})
						.catch(function(err) {
							document.getElementById('profile-content-body').innerHTML = '<p>Unable to load profile.</p>';
						});
				}

				document.querySelectorAll('.profile-tab').forEach(function(tab) {
					tab.addEventListener('click', function(e) {
						e.preventDefault();
						document.querySelectorAll('.profile-tab').forEach(function(t) {
							t.classList.remove('active');
						});
						this.classList.add('active');
						loadProfile(this.getAttribute('data-file'));
					});
				});

				loadProfile('audio_basic.md');
			</script>

	</body>
</html>
